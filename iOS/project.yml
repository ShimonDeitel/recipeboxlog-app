name: RecipeBoxLog
options:
  bundleIdPrefix: com.shimondeitel.recipeboxlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  RecipeBoxLog:
    type: application
    platform: iOS
    sources:
      - path: RecipeBoxLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.recipeboxlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: RecipeBoxLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RecipeBoxLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RecipeBoxLogTests
      - path: RecipeBoxLog.storekit
    dependencies:
      - target: RecipeBoxLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.recipeboxlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RecipeBoxLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RecipeBoxLogUITests
    dependencies:
      - target: RecipeBoxLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.recipeboxlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  RecipeBoxLog:
    build:
      targets:
        RecipeBoxLog: all
        RecipeBoxLogTests: [test]
        RecipeBoxLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: RecipeBoxLog.storekit
    test:
      config: Debug
      storeKitConfiguration: RecipeBoxLog.storekit
      targets:
        - RecipeBoxLogTests
        - RecipeBoxLogUITests
    archive:
      config: Release
